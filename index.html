<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silo - Real-time Voice Translator</title>
    <meta name="description" content="A premium real-time voice translator between English and Finnish.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1>Silo <span class="accent">AI</span></h1>
            <p class="subtitle">Real-time Voice Translation</p>
        </header>

        <div class="controls">
            <div class="toggle-wrapper">
                <span class="lang-label" id="label-from">English</span>
                <label class="switch">
                    <input type="checkbox" id="lang-toggle">
                    <span class="slider round"></span>
                </label>
                <span class="lang-label" id="label-to">Finnish</span>
            </div>
            <button id="cam-btn" class="secondary-btn" title="Toggle Camera">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M23 7L16 12L23 17V7Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M1 5H15V19H1V5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

        <div class="camera-container" id="camera-section" hidden>
            <div class="video-wrapper">
                <video id="video-feed" autoplay playsinline muted></video>
                <div class="video-overlay"></div>
            </div>
        </div>

        <div class="main-display">
            <div class="text-card input-card">
                <div class="card-header">
                    <span class="status-dot" id="mic-status"></span>
                    <span id="current-input-lang">Listening English...</span>
                </div>
                <div class="text-content" id="source-text" placeholder="Speak now...">...</div>
            </div>

            <div class="translate-arrow">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 4L12 20M12 20L18 14M12 20L6 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>

            <div class="text-card output-card">
                <div class="card-header">
                    <span id="current-output-lang">Finnish Translation</span>
                    <button id="copy-btn" title="Copy Translation">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M8 10H8.01M12 10H12.01M16 10H16.01M9 16H15M4 6C4 4.89543 4.89543 4 6 4H18C19.1046 4 20 4.89543 20 6V18C20 19.1046 19.1046 20 18 20H6C4.89543 20 4 19.1046 4 18V6Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                <div class="text-content" id="translated-text">Translations will appear here...</div>
            </div>
        </div>

        <div class="mic-section">
            <button id="mic-btn" class="mic-btn">
                <div class="pulse-ring"></div>
                <svg class="mic-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 1C11.2044 1 10.4413 1.31607 9.87868 1.87868C9.31607 2.44129 9 3.20435 9 4V12C9 12.7956 9.31607 13.5587 9.87868 14.1213C10.4413 14.6839 11.2044 15 12 15C12.7956 15 13.5587 14.6839 14.1213 14.1213C14.6839 13.5587 15 12.7956 15 12V4C15 3.20435 14.6839 2.44129 14.1213 1.87868C13.5587 1.31607 12.7956 1 12 1Z" fill="white"/>
                    <path d="M19 10V12C19 13.8565 18.2625 15.637 16.9497 16.9497C15.637 18.2625 13.8565 19 12 19C10.1435 19 8.36301 18.2625 7.05025 16.9497C5.7375 15.637 5 13.8565 5 12V10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 19V23M8 23H16" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <p id="mic-label">Press to Start Translating</p>
        </div>
    </div>

    <!-- Hidden audio element for future TTS if needed -->
    <audio id="audio-output" hidden></audio>

    <script src="app.js"></script>
</body>
</html>
